name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Forbid .sp text sizes (use .r)
        run: "! grep -rnE '\\.sp\\b' lib"

      - name: Forbid direct Theme.of(context).textTheme
        run: "! grep -rn 'Theme.of(context).textTheme' lib"
